<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анкета: Веб-разработка</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 10px; }
        .option { display: block; margin: 5px 0; }
        button { background: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .status { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .error { background: #ffe6e5; color: red; }
        .success { background: #d4edda; color: green; }
    </style>
</head>
<body>
    <h1>💻 Веб-разработка</h1>
    <p>Профессиональная диагностика · 5 ситуационных задач</p>

    <div id="questions"></div>

    <button id="downloadBtn">📥 Скачать Excel и отправить на почту</button>
    <div id="status" class="status"></div>

    <script>
        const questions = [
            { text: 'Вы сделали сайт, но заказчик говорит: «Мне не нравится кнопка». Что сделаете?', options: ['Объясню, что «так модно», оставлю как есть', 'Выслушаю пожелания, внесу правки', 'Обижусь и откажусь', 'Сделаю вид, что не понял'], correct: 1 },
            { text: 'Что для вас интереснее в веб-разработке?', options: ['Только писать код', 'Создавать удобные решения для людей', 'Получать деньги и не вникать', 'Только «крутые» проекты'], correct: 1 },
            { text: 'Почему важно проверять сайт на разных устройствах?', options: ['Чтобы работал корректно для всех', 'Требование для отчёта', 'Увеличить время разработки', 'Показать, сколько умею'], correct: 0 },
            { text: 'Заметили ошибку в чужой части работы. Что сделаете?', options: ['Промолчу — не моё дело', 'Сообщу коллеге, исправим вместе', 'Жалоба руководителю', 'Сам исправлю без спроса'], correct: 1 },
            { text: 'Как представляете работу веб-разработчика?', options: ['Один в тёмной комнате', 'В команде, обсуждаю задачи, учусь новому', 'Только общаюсь с заказчиками', 'Только по шаблонам'], correct: 1 }
        ];

        let answers = {};

        function renderQuestions() {
            const container = document.getElementById('questions');
            container.innerHTML = '';
            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<strong>${idx + 1}. ${q.text}</strong><br>`;
                q.options.forEach((opt, optIdx) => {
                    card.innerHTML += `<label class="option"><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label><br>`;
                });
                container.appendChild(card);
            });
        }

        function getAnswers() {
            for (let i = 0; i < questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (!selected) return null;
                answers[i] = parseInt(selected.value);
            }
            return answers;
        }

        function calculateScore() {
            let score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (answers[i] === questions[i].correct) score++;
            }
            return score;
        }

        function getInterpretation(score) {
            if (score >= 4) return 'Высокая мотивация';
            if (score >= 2) return 'Есть потенциал';
            return 'Рекомендована консультация';
        }

        function downloadExcel() {
            const answersData = getAnswers();
            if (!answersData) {
                document.getElementById('status').innerHTML = '❌ Ответьте на все вопросы!';
                document.getElementById('status').className = 'status error';
                return;
            }

            const score = calculateScore();
            const interpretation = getInterpretation(score);

            const excelData = [
                ['АНКЕТА: ВЕБ-РАЗРАБОТЧИК'],
                ['Дата', new Date().toLocaleString('ru-RU')],
                ['Итоговый балл', score + ' из 5'],
                ['Интерпретация', interpretation],
                [],
                ['Вопрос', 'Ответ'],
                ...questions.map((q, i) => [q.text, q.options[answers[i]]])
            ];

            const ws = XLSX.utils.aoa_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Результаты');
            XLSX.writeFile(wb, `Веб-разработка_${Date.now()}.xlsx`);

            const subject = encodeURIComponent('Результаты теста: Веб-разработка');
            const body = encodeURIComponent(`Итоговый балл: ${score} из 5\n${interpretation}\n\nФайл во вложении.`);
            
            window.location.href = `mailto:priem@bpkhmao.ru?subject=${subject}&body=${body}`;

            document.getElementById('status').innerHTML = '✅ Excel скачан! Откроется почта — прикрепите файл и отправьте.';
            document.getElementById('status').className = 'status success';
        }

        renderQuestions();
        document.getElementById('downloadBtn').onclick = downloadExcel;
    </script>
</body>
</html>
